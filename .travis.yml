language: c
sudo: required
dist: trusty
group: edge
addons:
  apt:
    packages:
    - liblocal-lib-perl
    - libxml2-dev
    - libsqlite3-dev
    - libsasl2-dev
    - libssl-dev
    - libopendkim-dev
    - libcunit1-dev
    - libpcre3-dev
    - uuid-dev
    - libdb-dev
    - libbsd-dev
    - libmilter-dev
    - graphviz
    - doxygen
    - help2man
    - python-docutils
    - python-pygments
    - libmagic-dev
    - pkg-config
env:
  global:
  - PERL5LIB=~/extlib/lib/perl5/
  - PERLLIB=~/extlib/lib/perl5/
  - CYRUS_USER=travis
  - CYRUSLIBS="/usr/local/cyruslibs"
  - PKG_CONFIG_PATH="$CYRUSLIBS/lib/pkgconfig:$PKG_CONFIG_PATH"
  - LDFLAGS="-Wl,-rpath,$CYRUSLIBS/lib -Wl,-rpath,$CYRUSLIBS/lib/x86_64-linux-gnu"
  - XAPIAN_CONFIG="$CYRUSLIBS/bin/xapian-config-1.5"
  - PATH="$CYRUSLIBS/bin:$PATH"
  - USE_CCACHE=1
cache:
  apt: true
  ccache: true
os: linux
compiler: gcc
install:
# cassandane
- sudo mkdir /var/tmp/cass
- sudo chmod 777 /var/tmp/cass
- mkdir ~/extlib
- cpanm -L ~/extlib --notest experimental
- cpanm -L ~/extlib --notest AnyEvent
- cpanm -L ~/extlib --notest BSD::Resource
- cpanm -L ~/extlib --notest Clone
- cpanm -L ~/extlib --notest Config::IniFiles
- cpanm -L ~/extlib --notest Convert::Base64
- cpanm -L ~/extlib --notest Data::ICal
- cpanm -L ~/extlib --notest Data::ICal::TimeZone
- cpanm -L ~/extlib --notest Data::UUID
- cpanm -L ~/extlib --notest DateTime
- cpanm -L ~/extlib --notest DateTime::Format::ICal
- cpanm -L ~/extlib --notest DateTime::Format::ISO8601
- cpanm -L ~/extlib --notest Encode::IMAPUTF7
- cpanm -L ~/extlib --notest File::LibMagic
- cpanm -L ~/extlib --notest File::Slurp
- cpanm -L ~/extlib --notest File::chdir
- cpanm -L ~/extlib --notest HTTP::Tiny
- cpanm -L ~/extlib --notest IO::Socket::INET6
- cpanm -L ~/extlib --notest IO::Stringy
- cpanm -L ~/extlib --notest JSON
- cpanm -L ~/extlib --notest JSON::XS
- cpanm -L ~/extlib --notest List::Pairwise
- cpanm -L ~/extlib --notest MIME::Types
- cpanm -L ~/extlib --notest Mail::IMAPTalk
- cpanm -L ~/extlib --notest Math::Int64
- cpanm -L ~/extlib --notest Net::LDAP::Server
- cpanm -L ~/extlib --notest Net::Server
- cpanm -L ~/extlib --notest News::NNTPClient
- cpanm -L ~/extlib --notest String::CRC32
- cpanm -L ~/extlib --notest Test::Unit
- cpanm -L ~/extlib --notest Text::LevenshteinXS
- cpanm -L ~/extlib --notest Text::VCardFast
- cpanm -L ~/extlib --notest Tie::DataUUID
- cpanm -L ~/extlib --notest Unix::Syslog
- cpanm -L ~/extlib --notest XML::DOM
- cpanm -L ~/extlib --notest XML::Fast
- cpanm -L ~/extlib --notest XML::Generator
- cpanm -L ~/extlib --notest XML::Spice
- cpanm -L ~/extlib --notest https://github.com/cyrusimap/Mail-JMAPTalk.git
- cpanm -L ~/extlib --notest https://github.com/cyrusimap/Net-DAVTalk.git
- cpanm -L ~/extlib --notest https://github.com/cyrusimap/Net-CalDAVTalk.git
- cpanm -L ~/extlib --notest https://github.com/cyrusimap/Net-CardDAVTalk.git
- git clone -b travis --single-branch https://github.com/wolfsage/cassandane.git cassandane

# libjanson
- git clone -b cyrus --single-branch https://github.com/cyrusimap/jansson.git janson
- pushd janson
- "autoreconf -v -i"
- "./configure --enable-silent-rules --prefix=$CYRUSLIBS"
- make -j 8
- sudo make install
- popd #janson

# libical
- git clone -b cyrus --single-branch https://github.com/cyrusimap/libical.git libical
- pushd libical
- mkdir build
- cd build
- cmake -DENABLE_GTK_DOC=OFF -DCMAKE_INSTALL_PREFIX=$CYRUSLIBS -DICU_BASE=$CYRUSLIBS -DUSE_BUILTIN_TZDATA=true -DCMAKE_SKIP_RPATH=ON -DICAL_ALLOW_EMPTY_PROPERTIES=true ..
- make
- sudo make install
- popd #libical

# Xapian
- git clone -b cyrus --single-branch https://github.com/cyrusimap/xapian.git xapian
- pushd xapian
- "./bootstrap"
- "./configure --enable-silent-rules --prefix=$CYRUSLIBS"
- pushd xapian-core
- make -j 8
- sudo make install
- popd #xapian-core
- popd #xapian
before_script:
- ccache --version
- ccache --zero-stats
- autoreconf -i -s
- ./configure CFLAGS="-W -Wno-unused-parameter -g -O0 -Wall -Wextra -Werror -fPIC"
  --enable-coverage --enable-calalarmd --enable-autocreate --enable-nntp --enable-http
  --enable-jmap --enable-xapian --enable-unit-tests --enable-replication --with-openssl=yes
  --enable-murder --enable-idled --enable-sieve --prefix=/usr/cyrus/
- make
- sudo make install
script:
# - make check
- pushd cassandane
- perl -I ~/extlib/lib/perl5/ ./testrunner.pl -vvv --config ../cassandane.ini -f pretty -j 8
after_script:
- sudo cat /var/log/syslog
- sudo cat /var/log/messages
branches:
  only:
  - master
  - travis
  - cyrus-imapd-3.0
notifications:
  slack:
    on_pull_requests: false
    on_success: change
    on_failure: always
    secure:
      
