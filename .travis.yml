language: c
sudo: required
dist: trusty
group: edge
addons:
  apt:
    packages:
    - libxml2-dev
    - libsqlite3-dev
    - libsasl2-dev
    - libssl-dev
    - libopendkim-dev
    - libcunit1-dev
    - libpcre3-dev
    - uuid-dev
    - libdb-dev
    - libbsd-dev
    - libmilter-dev
    - graphviz
    - doxygen
    - help2man
    - python-docutils
    - python-pygments
    - libmagic-dev
    - pkg-config
env:
  global:
  - CYRUSLIBS="/usr/local/cyruslibs"
  - PKG_CONFIG_PATH="$CYRUSLIBS/lib/pkgconfig:$PKG_CONFIG_PATH"
  - LDFLAGS="-Wl,-rpath,$CYRUSLIBS/lib -Wl,-rpath,$CYRUSLIBS/lib/x86_64-linux-gnu"
  - XAPIAN_CONFIG="$CYRUSLIBS/bin/xapian-config-1.5"
  - PATH="$CYRUSLIBS/bin:$PATH"
  - USE_CCACHE=1
cache:
  apt: true
  ccache: true
os: linux
compiler: gcc
install:
# cassandane
- cpanm --notest experimental
- cpanm --notest AnyEvent
- cpanm --notest BSD::Resource
- cpanm --notest Clone
- cpanm --notest Config::IniFiles
- cpanm --notest Convert::Base64
- cpanm --notest Data::ICal
- cpanm --notest Data::ICal::TimeZone
- cpanm --notest Data::UUID
- cpanm --notest DateTime
- cpanm --notest DateTime::Format::ICal
- cpanm --notest DateTime::Format::ISO8601
- cpanm --notest Encode::IMAPUTF7
- cpanm --notest File::LibMagic
- cpanm --notest File::Slurp
- cpanm --notest File::chdir
- cpanm --notest HTTP::Tiny
- cpanm --notest IO::Socket::INET6
- cpanm --notest IO::Stringy
- cpanm --notest JSON
- cpanm --notest JSON::XS
- cpanm --notest List::Pairwise
- cpanm --notest MIME::Types
- cpanm --notest Mail::IMAPTalk
- cpanm --notest Math::Int64
- cpanm --notest Net::LDAP::Server
- cpanm --notest Net::Server
- cpanm --notest News::NNTPClient
- cpanm --notest String::CRC32
- cpanm --notest Test::Unit
- cpanm --notest Text::LevenshteinXS
- cpanm --notest Text::VCardFast
- cpanm --notest Tie::DataUUID
- cpanm --notest Unix::Syslog
- cpanm --notest XML::DOM
- cpanm --notest XML::Fast
- cpanm --notest XML::Generator
- cpanm --notest XML::Spice
- cpanm --notest https://github.com/cyrusimap/Mail-JMAPTalk.git
- cpanm --notest https://github.com/cyrusimap/Net-DAVTalk.git
- cpanm --notest https://github.com/cyrusimap/Net-CalDAVTalk.git
- cpanm --notest https://github.com/cyrusimap/Net-CardDAVTalk.git
- git clone -b master --single-branch https://github.com/cyrusimap/cassandane.git cassandane

# libjanson
- git clone -b cyrus --single-branch https://github.com/cyrusimap/jansson.git janson
- pushd janson
- "autoreconf -v -i"
- "./configure --enable-silent-rules --prefix=$CYRUSLIBS"
- make -j 8
- sudo make install
- popd #janson

# libical
- git clone -b cyrus --single-branch https://github.com/cyrusimap/libical.git libical
- pushd libical
- mkdir build
- cd build
- cmake -DCMAKE_INSTALL_PREFIX=$CYRUSLIBS -DICU_BASE=$CYRUSLIBS -DUSE_BUILTIN_TZDATA=true -DCMAKE_SKIP_RPATH=ON -DICAL_ALLOW_EMPTY_PROPERTIES=true -DENABLE_GTK_DOC=OFF ..
- make
- sudo make install
- popd #libical

# Xapian
- git clone -b cyrus --single-branch https://github.com/cyrusimap/xapian.git xapian
- pushd xapian
- "./bootstrap"
- "./configure --enable-silent-rules --prefix=$CYRUSLIBS"
- pushd xapian-core
- make -j 8
- sudo make install
- popd #xapian-core
- popd #xapian
before_script:
- ccache --version
- ccache --zero-stats
- autoreconf -i -s
- ./configure CFLAGS="-W -Wno-unused-parameter -g -O0 -Wall -Wextra -Werror -fPIC"
  --enable-coverage --enable-calalarmd --enable-autocreate --enable-nntp --enable-http
  --enable-jmap --enable-xapian --enable-unit-tests --enable-replication --with-openssl=yes
  --enable-murder --enable-idled --enable-sieve --prefix=/usr/cyrus/
- make
- sudo make install
script:
- make check
- pushd cassandane
- sudo -E --config ../cassandane.ini ./testrunner.pl -f pretty -j 8
  
branches:
  only:
  - master
  - cyrus-imapd-3.0
notifications:
  slack:
    on_pull_requests: false
    on_success: change
    on_failure: always
    secure:
      
